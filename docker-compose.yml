services:
  db:
    image: postgres:16
    container_name: projeto-banquinho-bd
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-projeto_banquinho}
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    volumes:
      - projeto-banquinho-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-projeto_banquinho}"]
      interval: 5s
      timeout: 5s
      retries: 10

  prisma-migrate:
    build:
      context: ./backend/db-schema
      dockerfile: Dockerfile
    container_name: projeto-banquinho-prisma
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://dev:dev@db:5432/projeto_banquinho?schema=public}
    restart: "no"

  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile.seeder
    container_name: projeto-banquinho-seeder
    depends_on:
      prisma-migrate:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/projeto_banquinho}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-dev}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-dev}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-28800000}
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projeto-banquinho-backend
    depends_on:
      prisma-migrate:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/projeto_banquinho}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-dev}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-dev}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-28800000}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projeto-banquinho-frontend
    working_dir: /app
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200"
    ports:
      - "4200:4200"
    restart: unless-stopped

volumes:
  projeto-banquinho-data:
  frontend-node-modules: