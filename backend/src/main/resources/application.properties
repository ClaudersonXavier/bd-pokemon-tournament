spring.application.name=Projeto banquinho BD
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5433/projeto_banquinho
spring.datasource.username=admin
spring.datasource.password=admin
spring.jpa.show-sql=true
# DDL é gerenciado pelo init-db/01-schema.sql no Docker
# Use 'none' quando rodar via Docker, 'create' para desenvolvimento local sem Docker
spring.jpa.hibernate.ddl-auto=none